services:
  questdb:
    image: questdb/questdb:latest
    container_name: wind_questdb
    ports:
      - "9000:9000"   # Web UI de QuestDB
      - "9009:9009"   # InfluxDB line protocol (ingestión)
      - "8812:8812"   # PostgreSQL wire protocol
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_CAIRO_COMMIT_LAG=100
      - QDB_LINE_TCP_MSG_BUFFER_SIZE=10485760
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9000' 2>/dev/null && echo ok || exit 1"]
      start_period: 20s   # tiempo para que arranque la JVM antes del primer check
      interval: 5s
      timeout: 5s
      retries: 15

  metabase:
    image: metabase/metabase:latest
    container_name: wind_metabase
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db   # persiste en volumen
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      questdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 18

  metabase-setup:
    image: python:3.12-slim
    container_name: wind_metabase_setup
    depends_on:
      metabase:
        condition: service_healthy
    volumes:
      - ./metabase-setup:/setup
    environment:
      - METABASE_URL=http://metabase:3000
      - METABASE_EMAIL=admin@windturbine.com
      - METABASE_PASSWORD=WindTurbine2024!
      - QUESTDB_MB_HOST=questdb
      - QUESTDB_PG_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASS=quest
    command: >
      sh -c "pip install requests -q &&
             python /setup/setup_metabase.py"
    restart: "no"

volumes:
  questdb_data:
  metabase_data:
